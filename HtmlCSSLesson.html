    property: value;

} </div>

  title: "🎨 CSS Position Property",
  content: `
    <h2>CSS Position Property</h2>

    <p>
      The <code>position</code> property in CSS is used to control how an element
      is positioned on a webpage. It determines where an element appears
      relative to its normal position, parent element, or browser window.
    </p>

    <h3>Types of Position Values</h3>

    <h3>1. Static (Default)</h3>
    <p>
      The default position for all HTML elements. Elements appear in the normal
      document flow and cannot be moved using top, right, bottom, or left.
    </p>

     <div class="code-block">div {
    position: static;
}  </div>

    <h3>2. Relative</h3>
    <p>
      The element remains in the normal document flow, but can be moved relative
      to its original position.
    </p>

     <div class="code-block">div {
    position: relative;
    top: 20px;
    left: 30px;
} </div>

    <p>
      The element moves 20px down and 30px to the right from its original position.
    </p>

    <h3>3. Absolute</h3>
    <p>
      The element is removed from the normal document flow and positioned
      relative to its nearest positioned ancestor.
    </p>

     <div class="code-block">.parent {
    position: relative;
}

.child {
    position: absolute;
    top: 10px;
    right: 10px;
} </div>

    <p>
      The child element is placed 10px from the top and right of its parent.
    </p>

    <h3>4. Fixed</h3>
    <p>
      The element is positioned relative to the browser window and stays in the
      same place even when the page is scrolled.
    </p>

     <div class="code-block">button {
    position: fixed;
    bottom: 20px;
    right: 20px;
}</div>

    <p>
      Commonly used for chat buttons, back-to-top buttons, and navigation bars.
    </p>

    <h3>5. Sticky</h3>
    <p>
      The element behaves like relative until a scroll position is reached,
      then it becomes fixed.
    </p>

     <div class="code-block">header {
    position: sticky;
    top: 0;
}</div>

    <p>
      Commonly used for sticky navigation menus.
    </p>

    <h3>Position Properties</h3>
    <p>
      These properties work with relative, absolute, fixed, and sticky positions:
    </p>

    <ul>
      <li><code>top</code> - Moves the element downward from the top.</li>
      <li><code>right</code> - Moves the element from the right side.</li>
      <li><code>bottom</code> - Moves the element upward from the bottom.</li>
      <li><code>left</code> - Moves the element from the left side.</li>
    </ul>

    <h3>Real-Life Example</h3>

    <ul>
      <li><strong>Static:</strong> Books arranged normally on a shelf.</li>
      <li><strong>Relative:</strong> Moving a book slightly from its original position.</li>
      <li><strong>Absolute:</strong> Placing a note at an exact spot on a desk.</li>
      <li><strong>Fixed:</strong> A clock attached to a wall that stays visible.</li>
      <li><strong>Sticky:</strong> A bookmark that stays at the top while reading.</li>
    </ul>

    <h3>Practice Exercises</h3>

    <ol>
      <li>Create a box and move it using <code>position: relative</code>.</li>
      <li>Place a small badge in the corner of an image using <code>position: absolute</code>.</li>
      <li>Create a fixed "Back to Top" button.</li>
      <li>Create a sticky navigation bar.</li>
    </ol>

    <h3>Summary</h3>

    <ul>
      <li><code>static</code> → Default positioning.</li>
      <li><code>relative</code> → Moves relative to original position.</li>
      <li><code>absolute</code> → Positions relative to nearest positioned parent.</li>
      <li><code>fixed</code> → Stays fixed on the screen.</li>
      <li><code>sticky</code> → Switches between relative and fixed when scrolling.</li>
    </ul>
  `

    </p>

    <p>
      It is often used as an alternative to multiple <strong>if...else if</strong> statements.
    </p>

    <h3>Syntax</h3>

    <div class="code-block">switch(expression) {

    case value1:
        // code block
        break;

    case value2:
        // code block
        break;

    default:
        // default code block
} </div>

    <h3>How It Works</h3>

    <ol>
      <li>JavaScript evaluates the expression.</li>
      <li>It compares the result with each case value.</li>
      <li>If a match is found, the corresponding code runs.</li>
      <li>The <strong>break</strong> statement stops the switch.</li>
      <li>If no match is found, the <strong>default</strong> block runs.</li>
    </ol>

    <h3>Example 1: Day of the Week</h3>

    <div class="code-block">let day = 3;

switch(day) {

    case 1:
        console.log("Monday");
        break;

    case 2:
        console.log("Tuesday");
        break;

    case 3:
        console.log("Wednesday");
        break;

    case 4:
        console.log("Thursday");
        break;

    case 5:
        console.log("Friday");
        break;

    default:
        console.log("Weekend");
}</div>

    <p><strong>Result:</strong></p>

    <div class="code-block">Wednesday</div>

    <h3>Example 2: Grade Checker</h3>

    <div class="code-block">let grade = "A";

switch(grade) {

    case "A":
        console.log("Excellent");
        break;

    case "B":
        console.log("Good");
        break;

    case "C":
        console.log("Average");
        break;

    default:
        console.log("Try Again");
}</div>

    <p><strong>Result:</strong></p>

    <div class="code-block">Excellent</div>

    <h3>The break Statement</h3>

    <p>
      The <strong>break</strong> statement exits the switch block.
    </p>

    <div class="code-block">let fruit = "apple";

switch(fruit) {

    case "apple":
        console.log("Apple");
        break;

    case "banana":
        console.log("Banana");
        break;
}</div>

      Without break, JavaScript continues executing the next case.
    </p>

    <h3>Example Without break</h3>

    <div class="code-block">let fruit = "apple";

        console.log("Banana");

      The <strong>default</strong> case runs when no match is found.

    </p>

    </p>

    <div class="code-block">function myFunction() {

    </p>

    </p>

            ${currentLesson < lessons.length - 1 ? `<button onclick="nav(1)" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm">Next <i data-lucide="chevron-right" class="w-4 h-4"></i></button>` : '<span></span>'}
          </div>
        </article>
        <style>
          .lesson-content h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; color: #6ee7b7; }
          .lesson-content h3 { font-size: 1.2rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #a7f3d0; }
          .lesson-content p { margin-bottom: 1rem; line-height: 1.7; color: #d1d5db; }
          .lesson-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
          .lesson-content li { margin-bottom: 0.4rem; color: #d1d5db; line-height: 1.6; }
          .lesson-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
          .lesson-content code { background: #374151; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #a5b4fc; }
          .lesson-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; background: #1f2937; border-radius: 0.5rem; overflow: hidden; }
          .lesson-content th, .lesson-content td { border: 1px solid #4b5563; padding: 0.75rem 1rem; text-align: left; }
          .lesson-content th { background: #374151; font-weight: 600; }
          .network-diagram { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border: 1px solid #475569; border-radius: 8px; padding: 1.25rem; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #cbd5e1; margin: 1rem 0; }
        </style>
      `;
      lucide.createIcons();
    }

    function renderAll() {
      buildNav(document.getElementById('nav-list'));
      buildNav(document.getElementById('mobile-nav-list'));
      renderContent();
    }

    window.nav = function(dir) { 
      currentLesson += dir; 
      renderAll(); 
      document.getElementById('main-content').scrollTop = 0; 
    };

    window.goHome = function() { window.location.href = 'index.html'; };

    window.toggleMobile = function(force) {
      const sidebar = document.getElementById('mobile-sidebar');
      const overlay = document.getElementById('mobile-overlay');
      const show = force !== undefined ? force : !sidebar.classList.contains('hidden');
      sidebar.classList.toggle('hidden', !show);
      overlay.classList.toggle('hidden', !show);
    };

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('mobile-menu-btn').onclick = () => toggleMobile();
      renderAll();
      lucide.createIcons();
    });

    const defaultConfig = { 
      site_title: 'Computer Networks', 
      primary_color: '#10b981', 
      surface_color: '#1f2937', 
      text_color: '#d1d5db', 
      accent_color: '#6ee7b7', 
      bg_color: '#111827', 
      font_family: 'Source Sans 3', 
      font_size: 16 
    };

    function applyConfig(config) {
      document.getElementById('site-title').textContent = config.site_title || defaultConfig.site_title;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
            { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
        }),
        mapToEditPanelValues: (config) => new Map([["site_title", config.site_title || defaultConfig.site_title]])
      });
    }
  </script>
 </body>
</html>
