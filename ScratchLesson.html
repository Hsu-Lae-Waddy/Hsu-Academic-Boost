<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch Course</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Source Sans 3', sans-serif; box-sizing: border-box; }
    code, .mono { font-family: 'JetBrains Mono', monospace; }
    .sidebar-item { transition: all 0.15s; }
    .sidebar-item:hover { background: #2d3748; }
    .sidebar-item.active { background: #1a73e8; color: #fff; }
    .code-block { 
      background: #1e1e2e; 
      color: #cdd6f4; 
      border-radius: 8px; 
      padding: 16px; 
      overflow-x: auto; 
      white-space: pre; 
      font-size: 0.85rem; 
      line-height: 1.6; 
      margin: 1rem 0;
      tab-size: 2;
    }
    .code-block .keyword { color: #cba6f7; }
    .code-block .string { color: #a6e3a1; }
    .code-block .comment { color: #6c7086; font-style: italic; }
    .code-block .type { color: #89b4fa; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-900 text-gray-100">
  <div class="flex h-full w-full">
   <!-- Sidebar -->
   <aside id="sidebar" class="w-64 min-w-[256px] bg-gray-800 border-r border-gray-700 overflow-y-auto flex-shrink-0 hidden md:block">
    <div class="p-5 border-b border-gray-700">
       <div class="flex items-center gap-3 mb-3">
          <button onclick="goHome()" class="hover:bg-gray-700 p-1.5 rounded transition" title="Go Home">
            <i data-lucide="home" class="w-5 h-5"></i>
          </button>
          <h1 id="site-title" class="text-lg font-bold text-emerald-400 mono flex-1">Scratch Course</h1>
        </div>
    </div>
    <nav class="py-2" id="nav-list"></nav>
   </aside>
   <!-- Mobile menu button --> 
   <button id="mobile-menu-btn" class="md:hidden fixed top-3 left-3 z-50 bg-gray-800 p-2 rounded-lg border border-gray-700 hover:bg-gray-700 transition"> 
    <i data-lucide="menu" class="w-5 h-5"></i> 
   </button> 
   <!-- Mobile overlay -->
   <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/60 z-40 md:hidden" onclick="toggleMobile()"></div>
   <aside id="mobile-sidebar" class="hidden fixed left-0 top-0 h-full w-64 bg-gray-800 z-50 overflow-y-auto md:hidden shadow-2xl">
    <div class="p-5 border-b border-gray-700 flex justify-between items-center">
     <div class="flex items-center gap-3">
       <button onclick="goHome()" class="hover:bg-gray-700 p-1.5 rounded transition" title="Go Home">
         <i data-lucide="home" class="w-5 h-5"></i>
       </button>
       <h1 class="text-lg font-bold text-emerald-400 mono">Scratch</h1>
     </div>
     <button onclick="toggleMobile()" class="hover:bg-gray-700 p-1.5 rounded transition">
      <i data-lucide="x" class="w-5 h-5"></i>
     </button>
    </div>
    <nav class="py-2" id="mobile-nav-list"></nav>
   </aside>
   <!-- Main Content -->
   <main class="flex-1 overflow-y-auto p-6 md:p-10" id="main-content"></main>
  </div>
  <script>
    const lessons = [
      // 🟡 BEGINNER LEVEL
      {
        title: "🟡 What is Scratch?",
        content: `
          <h2>What is Scratch?</h2>
          <p>Scratch is a <strong>free visual programming language</strong> created by MIT. Instead of typing complex code, you drag and drop colorful blocks to create programs, games, and animations.</p>
          <h3>Why Learn Scratch?</h3>
          <ul>
            <li><strong>Visual Learning</strong> — See your code as blocks</li>
            <li><strong>Instant Results</strong> — Run code immediately</li>
            <li><strong>Creative Freedom</strong> — Make games & stories</li>
            <li><strong>Real Programming</strong> — Concepts transfer to Python, JavaScript</li>
          </ul>
          <h3>Scratch Interface</h3>
          <table>
            <thead><tr><th>Area</th><th>Purpose</th></tr></thead>
            <tbody>
              <tr><td><strong>Stage</strong></td><td>Where project runs</td></tr>
              <tr><td><strong>Sprites</strong></td><td>Characters/objects</td></tr>
              <tr><td><strong>Blocks</strong></td><td>Code palette (by color)</td></tr>
              <tr><td><strong>Scripts</strong></td><td>Where you build code</td></tr>
            </tbody>
          </table>
          <p><strong>Start here:</strong> <a href="https://scratch.mit.edu" target="_blank">scratch.mit.edu</a> → Click "Create"</p>
        `
      },
      {
        title: "🟡 What is a Sprite?",
        content: `
          <h2>What is a Sprite?</h2>
          <p>A <strong>sprite</strong> is any character or object in your Scratch project. Each sprite can have its own code, costumes, and sounds.</p>
          <h3>Sprite Properties</h3>
          <ul>
            <li><strong>Costumes</strong> — Images/appearance</li>
            <li><strong>Position (x,y)</strong> — Location on stage (-240 to 240)</li>
            <li><strong>Direction</strong> — Facing angle (0-360°)</li>
            <li><strong>Size</strong> — Scale (0-100%+)</li>
            <li><strong>Visible?</strong> — Show/hide toggle</li>
          </ul>
          <h3>Managing Sprites</h3>
          <table>
            <thead><tr><th>Action</th><th>How</th></tr></thead>
            <tbody>
              <tr><td>Add sprite</td><td>Click <strong>+</strong> button</td></tr>
              <tr><td>Rename</td><td>Click sprite → edit name</td></tr>
              <tr><td>Delete</td><td>Right-click → Delete</td></tr>
              <tr><td>Costumes</td><td>Costumes tab → Paint new</td></tr>
            </tbody>
          </table>
          <p><strong>Tip:</strong> Default sprite is Scratch Cat!</p>
        `
      },
      {
        title: "🟡 Motion Blocks",
        content: `
          <h2>Motion Blocks (🟦 Blue)</h2>
          <p>Motion blocks control sprite movement. Found in the <strong>blue</strong> Motion category.</p>
          <h3>Key Motion Blocks</h3>
          <table>
            <thead><tr><th>Block</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><code>move 10 steps</code></td><td>Moves forward in current direction</td></tr>
              <tr><td><code>turn cw 15°</code></td><td>Turn clockwise</td></tr>
              <tr><td><code>turn ccw 15°</code></td><td>Turn counter-clockwise</td></tr>
              <tr><td><code>go to x:0 y:0</code></td><td>Jump to exact position</td></tr>
              <tr><td><code>glide 2s to x:0 y:0</code></td><td>Smooth movement over time</td></tr>
              <tr><td><code>if on edge, bounce</code></td><td>Bounce off stage edges</td></tr>
            </tbody>
          </table>
          <h3>Example: Spiral Pattern</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
<span class="keyword">repeat</span> <span class="type">36</span>
  move <span class="type">10</span> steps
  turn cw <span class="type">10</span> degrees</div>
        `
      },
      {
        title: "🟡 Looks Blocks",
        content: `
          <h2>Looks Blocks (🟣 Purple)</h2>
          <p>Looks blocks control sprite appearance. Found in the <strong>purple</strong> Looks category.</p>
          <h3>Key Looks Blocks</h3>
          <table>
            <thead><tr><th>Block</th><th>Effect</th></tr></thead>
            <tbody>
              <tr><td><code>say "Hi!" 2 secs</code></td><td>Speech bubble</td></tr>
              <tr><td><code>think "Hmm" 2 secs</code></td><td>Thought bubble</td></tr>
              <tr><td><code>switch costume to cat2</code></td><td>Change appearance</td></tr>
              <tr><td><code>next costume</code></td><td>Next costume in list</td></tr>
              <tr><td><code>change size by 10</code></td><td>Grow/shrink sprite</td></tr>
              <tr><td><code>show</code> / <code>hide</code></td><td>Visible/invisible</td></tr>
            </tbody>
          </table>
          <h3>Example: Animated Greeting</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
say <span class="string">"Hello!"</span> <span class="keyword">for</span> <span class="type">2</span> <span class="keyword">seconds</span>
change size by <span class="type">20</span>
next costume
wait <span class="type">1</span> <span class="keyword">seconds</span>
change size by -<span class="type">20</span></div>
        `
      },
      {
        title: "🟡 Events (Green Flag)",
        content: `
          <h2>Events (🟠 Orange)</h2>
          <p>Events trigger your code. Most common is <strong>"when green flag clicked"</strong> (🟢).</p>
          <h3>Key Event Blocks</h3>
          <table>
            <thead><tr><th>Block</th><th>Triggers When</th></tr></thead>
            <tbody>
              <tr><td><code>when green flag clicked</code></td><td>Green flag pressed</td></tr>
              <tr><td><code>when [space] key pressed</code></td><td>Specific key pressed</td></tr>
              <tr><td><code>when this sprite clicked</code></td><td>Sprite clicked</td></tr>
              <tr><td><code>when I receive [message1]</code></td><td>Message broadcast</td></tr>
            </tbody>
          </table>
          <h3>Green Flag Workflow</h3>
          <p>1. Click green flag (🟢) → All "when green flag clicked" scripts run<br>
             2. Click red stop sign (🔴) → All scripts stop</p>
          <h3>Example</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
forever
  move <span class="type">5</span> steps
  <span class="keyword">if</span> on edge, bounce</div>
        `
      },

      // 🔵 INTERMEDIATE LEVEL
      {
        title: "🔵 Loops (Repeat)",
        content: `
          <h2>Loops (🟠 Orange)</h2>
          <p>Loops repeat code blocks. Avoid copying the same code over and over!</p>
          <h3>Loop Types</h3>
          <table>
            <thead><tr><th>Block</th><th>Use When</th></tr></thead>
            <tbody>
              <tr><td><code>repeat 10</code></td><td>Known number of repeats</td></tr>
              <tr><td><code>repeat until [done]</code></td><td>Until condition met</td></tr>
              <tr><td><code>forever</code></td><td>Continuous loop</td></tr>
            </tbody>
          </table>
          <h3>Example: Draw Square</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
pen down
repeat <span class="type">4</span>
  move <span class="type">100</span> steps
  turn cw <span class="type">90</span> degrees</div>
          <h3>Example: Bouncing Ball</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
forever
  move <span class="type">3</span> steps
  <span class="keyword">if</span> on edge, bounce</div>
        `
      },
      {
        title: "🔵 Conditions (If/Else)",
        content: `
          <h2>Conditions (🟠 Orange)</h2>
          <p>Conditions let code make decisions: "If this is true, do that."</p>
          <h3>Common Conditions</h3>
          <table>
            <thead><tr><th>Check</th><th>Example</th></tr></thead>
            <tbody>
              <tr><td>Key pressed?</td><td><code>[right arrow] key pressed?</code></td></tr>
              <tr><td>Touching?</td><td><code>touching [Player]?</code></td></tr>
              <tr><td>Position</td><td><code>x position > 100?</code></td></tr>
              <tr><td>Variable</td><td><code>[score] > 10?</code></td></tr>
            </tbody>
          </table>
          <h3>Example: Arrow Key Control</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
forever
  <span class="keyword">if</span> <span class="string">"right arrow"</span> key pressed? <span class="keyword">then</span>
    change x by <span class="type">5</span>
  <span class="keyword">if</span> <span class="string">"left arrow"</span> key pressed? <span class="keyword">then</span>
    change x by -<span class="type">5</span></div>
          <h3>Example: If/Else</h3>
          <div class="code-block">forever
  <span class="keyword">if</span> touching <span class="string">"Player"</span>? <span class="keyword">then</span>
    say <span class="string">"Got you!"</span> <span class="keyword">for</span> <span class="type">1</span> <span class="keyword">secs</span>
  <span class="keyword">else</span>
    say <span class="string">"Missed!"</span> <span class="keyword">for</span> <span class="type">0.5</span> <span class="keyword">secs</span></div>
        `
      },
      {
        title: "🔵 Variables",
        content: `
          <h2>Variables (🔴 Red)</h2>
          <p>Variables store data like scores, lives, or timers. Create in Variables category.</p>
          <h3>Creating Variables</h3>
          <ol>
            <li>Variables blocks → "Make a Variable"</li>
            <li>Name it (score, lives, speed, etc.)</li>
            <li>For all sprites or this sprite only</li>
          </ol>
          <h3>Variable Blocks</h3>
          <table>
            <thead><tr><th>Block</th><th>Action</th></tr></thead>
            <tbody>
              <tr><td><code>set [score] to 0</code></td><td>Set exact value</td></tr>
              <tr><td><code>change [score] by 1</code></td><td>Add/subtract</td></tr>
              <tr><td><code>show variable [score]</code></td><td>Display on stage</td></tr>
            </tbody>
          </table>
          <h3>Example: Clicker Game</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
set [score] to <span class="type">0</span>
show variable [score]

<span class="keyword">when this sprite clicked</span>
change [score] by <span class="type">1</span></div>
        `
      },
      {
        title: "🔵 Simple Games",
        content: `
          <h2>Building Simple Games</h2>
          <p>Combine motion, loops, conditions, and variables to make games!</p>
          <h3>Game Structure</h3>
          <ol>
            <li><strong>Setup:</strong> Reset variables, position sprites</li>
            <li><strong>Main Loop:</strong> Handle input, update game, check collisions</li>
            <li><strong>Win/Lose:</strong> End conditions</li>
          </ol>
          <h3>Easy Game Ideas</h3>
          <table>
            <thead><tr><th>Game</th><th>Skills Used</th></tr></thead>
            <tbody>
              <tr><td>Pong</td><td>Keys, collision, score</td></tr>
              <tr><td>Flappy Bird</td><td>Gravity, obstacles, score</td></tr>
              <tr><td>Catch Game</td><td>Random spawn, player control</td></tr>
              <tr><td>Maze</td><td>Walls, pathfinding</td></tr>
            </tbody>
          </table>
          <h3>Catch Game Example</h3>
          <div class="code-block"><span class="comment"># Player Sprite</span>
<span class="keyword">when green flag clicked</span>
forever
  <span class="keyword">if</span> <span class="string">"left arrow"</span> key pressed? <span class="keyword">then</span>
    change x by -<span class="type">10</span>
  <span class="keyword">if</span> <span class="string">"right arrow"</span> key pressed? <span class="keyword">then</span>
    change x by <span class="type">10</span>

<span class="comment"># Apple Sprite</span>
<span class="keyword">when green flag clicked</span>
forever
  go to x:(pick random -200 to 200) y:180
  <span class="keyword">if</span> touching <span class="string">"Player"</span>? <span class="keyword">then</span>
    change [score] by <span class="type">1</span>
    start sound [pop]</div>
        `
      },

      // 🔴 ADVANCED LEVEL
      {
        title: "🔴 Game Development",
        content: `
          <h2>Advanced Game Development</h2>
          <p>Professional techniques for polished games: state management, levels, AI, effects.</p>
          <h3>Game States</h3>
          <ul>
            <li><strong>menu</strong> — Title screen</li>
            <li><strong>playing</strong> — Main gameplay</li>
            <li><strong>paused</strong> — Game frozen</li>
            <li><strong>game_over</strong> — Win/lose screen</li>
          </ul>
          <h3>Messages (Broadcast)</h3>
          <div class="code-block"><span class="comment"># Player hits enemy</span>
<span class="keyword">if</span> touching <span class="string">"Enemy"</span>? <span class="keyword">then</span>
  broadcast <span class="string">"player hit"</span>

<span class="comment"># Health sprite receives message</span>
<span class="keyword">when I receive</span> <span class="string">"player hit"</span>
change [health] by -<span class="type">1</span>
<span class="keyword">if</span> <span class="type">health</span> ≤ <span class="type">0</span> <span class="keyword">then</span>
  broadcast <span class="string">"game over"</span></div>
          <h3>Clones</h3>
          <p><code>create clone of [myself]</code> → Duplicate sprites dynamically (bullets, enemies)</p>
        `
      },
      {
        title: "🔴 Collision Detection",
        content: `
          <h2>Collision Detection (🟠 Orange)</h2>
          <p>Detect when sprites touch each other or colors.</p>
          <h3>Collision Blocks</h3>
          <table>
            <thead><tr><th>Block</th><th>Detects</th></tr></thead>
            <tbody>
              <tr><td><code>touching [Enemy]?</code></td><td>Specific sprite</td></tr>
              <tr><td><code>touching color [#ff0000]?</code></td><td>Specific color</td></tr>
              <tr><td><code>distance to [Player] &lt; 50</code></td><td>Proximity</td></tr>
            </tbody>
          </table>
          <h3>Bullet Example</h3>
          <div class="code-block"><span class="comment"># Bullet sprite</span>
<span class="keyword">when I start as a clone</span>
repeat until <span class="type">&lt;</span>touching edge<span class="type">&gt;</span>
  move <span class="type">15</span> steps
  <span class="keyword">if</span> touching <span class="string">"Enemy"</span>? <span class="keyword">then</span>
    broadcast <span class="string">"enemy hit"</span>
    delete this clone</div>
          <h3>Pro Tip</h3>
          <p>Use <code>touching color</code> for invisible walls/platforms!</p>
        `
      },
      {
        title: "🔴 Score System",
        content: `
          <h2>Advanced Score Systems (🔴 Red)</h2>
          <p>Go beyond simple counters with multipliers, combos, and high scores.</p>
          <h3>Combo System</h3>
          <div class="code-block"><span class="keyword">when I receive</span> <span class="string">"hit"</span>
change [combo] by <span class="type">1</span>
change [score] by ((<span class="type">10</span> * [combo v]))

<span class="keyword">when I receive</span> <span class="string">"miss"</span>
set [combo] to <span class="type">0</span></div>
          <h3>High Score Tracking</h3>
          <div class="code-block"><span class="keyword">when green flag clicked</span>
<span class="keyword">if</span> [score v] > [high score v] <span class="keyword">then</span>
  set [high score v] to [score v]
  say <span class="string">"New Record!"</span> <span class="keyword">for</span> <span class="type">2</span> <span class="keyword">secs</span></div>
          <h3>Multiple Score Types</h3>
          <ul>
            <li><code>score</code> — Points earned</li>
            <li><code>multiplier</code> — Bonus factor</li>
            <li><code>high_score</code> — Best ever</li>
            <li><code>level</code> — Current difficulty</li>
          </ul>
        `
      },
      {
        title: "🔴 Multiplayer Logic",
        content: `
          <h2>Multiplayer Games</h2>
          <p>Multiple players on same screen or turn-based games.</p>
          <h3>Local Multiplayer (Same Keyboard)</h3>
          <table>
            <thead><tr><th>Player 1</th><th>Player 2</th></tr></thead>
            <tbody>
              <tr><td>W/A/S/D</td><td>Arrow Keys</td></tr>
              <tr><td>Space (shoot)</td><td>Enter (shoot)</td></tr>
              <tr><td>p1_score</td><td>p2_score</td></tr>
            </tbody>
          </table>
          <h3>2-Player Pong Example</h3>
          <div class="code-block"><span class="comment"># Paddle 1 (W/S keys)</span>
<span class="keyword">when green flag clicked</span>
forever
  <span class="keyword">if</span> <span class="string">"w"</span> key pressed? <span class="keyword">then</span>
    change y by <span class="type">4</span>
  <span class="keyword">if</span> <span class="string">"s"</span> key pressed? <span class="keyword">then</span>
    change y by -<span class="type">4</span>

<span class="comment"># Ball</span>
<span class="keyword">when green flag clicked</span>
point in direction <span class="type">90</span>
forever
  move <span class="type">6</span> steps
  <span class="keyword">if</span> touching <span class="string">"Paddle1"</span>? <span class="keyword">or</span> touching <span class="string">"Paddle2"</span>? <span class="keyword">then</span>
    turn cw <span class="type">180</span></div>
          <h3>Turn-Based</h3>
          <p>Use variable <code>current_player</code> (1 or 2) to alternate turns.</p>
        `
      }
    ];

    let currentLesson = 0;

    function buildNav(container) {
      container.innerHTML = '';
      lessons.forEach((lesson, i) => {
        const item = document.createElement('div');
        item.className = `sidebar-item px-5 py-2.5 cursor-pointer text-sm text-gray-300 ${i === currentLesson ? 'active' : ''}`;
        item.textContent = lesson.title;
        item.onclick = () => { currentLesson = i; renderAll(); toggleMobile(false); };
        container.appendChild(item);
      });
    }

    function renderContent() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <article class="max-w-3xl mx-auto lesson-content">
          ${lessons[currentLesson].content}
          <div class="flex justify-between mt-10 pt-6 border-t border-gray-700">
            ${currentLesson > 0 ? `<button onclick="nav(-1)" class="flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm"><i data-lucide="chevron-left" class="w-4 h-4"></i> Previous</button>` : '<span></span>'}
            ${currentLesson < lessons.length - 1 ? `<button onclick="nav(1)" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm">Next <i data-lucide="chevron-right" class="w-4 h-4"></i></button>` : '<span></span>'}
          </div>
        </article>
        <style>
          .lesson-content h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; color: #6ee7b7; }
          .lesson-content h3 { font-size: 1.2rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #a7f3d0; }
          .lesson-content p { margin-bottom: 1rem; line-height: 1.7; color: #d1d5db; }
          .lesson-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
          .lesson-content li { margin-bottom: 0.4rem; color: #d1d5db; line-height: 1.6; }
          .lesson-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
          .lesson-content code { background: #374151; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #a5b4fc; }
          .lesson-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; background: #1f2937; border-radius: 0.5rem; overflow: hidden; }
          .lesson-content th, .lesson-content td { border: 1px solid #4b5563; padding: 0.75rem 1rem; text-align: left; }
          .lesson-content th { background: #374151; font-weight: 600; }
          .lesson-content a { color: #34d399; }
          .lesson-content a:hover { text-decoration: underline; }
        </style>
      `;
      lucide.createIcons();
    }

    function renderAll() {
      buildNav(document.getElementById('nav-list'));
      buildNav(document.getElementById('mobile-nav-list'));
      renderContent();
    }

    // FIXED: All functions properly exposed
    window.nav = function(dir) { 
      currentLesson += dir; 
      renderAll(); 
      document.getElementById('main-content').scrollTop = 0; 
    };

    window.goHome = function() { window.location.href = 'index.html'; };

    window.toggleMobile = function(force) {
      const sidebar = document.getElementById('mobile-sidebar');
      const overlay = document.getElementById('mobile-overlay');
      const show = force !== undefined ? force : !sidebar.classList.contains('hidden');
      sidebar.classList.toggle('hidden', !show);
      overlay.classList.toggle('hidden', !show);
    };

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('mobile-menu-btn').onclick = () => toggleMobile();
      renderAll();
      lucide.createIcons();
    });

    // SDK
    const defaultConfig = { 
      site_title: 'Scratch Course', 
      primary_color: '#10b981', 
      surface_color: '#1f2937', 
      text_color: '#d1d5db', 
      accent_color: '#6ee7b7', 
      bg_color: '#111827', 
      font_family: 'Source Sans 3', 
      font_size: 16 
    };

    function applyConfig(config) {
      document.getElementById('site-title').textContent = config.site_title || defaultConfig.site_title;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
            { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
        }),
        mapToEditPanelValues: (config) => new Map([["site_title", config.site_title || defaultConfig.site_title]])
      });
    }
  </script>
 </body>
</html>
