<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Lessons - Scratch Course</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="https://cdn.tailwindcss.com/3.4.17" as="script">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" as="style">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Source Sans 3', sans-serif; box-sizing: border-box; }
    code, .mono { font-family: 'JetBrains Mono', monospace; }
    .sidebar-item { transition: all 0.15s; }
    .sidebar-item:hover { background: #2d3748; }
    .sidebar-item.active { background: #1a73e8; color: #fff; }
    .sidebar-item.completed { border-left: 3px solid #10b981; background: rgba(16, 185, 129, 0.1); }
    .sidebar-item.completed:hover { background: rgba(16, 185, 129, 0.2); }
    .code-block { 
      background: #1e1e2e; 
      color: #cdd6f4; 
      border-radius: 8px; 
      padding: 16px; 
      overflow-x: auto;
      tab-size: 2;
      font-size: 14px;
      line-height: 1.6;
      margin: 1rem 0;
      white-space: pre-wrap;
    }
    .code-block .keyword { color: #cba6f7; }
    .code-block .string { color: #a6e3a1; }
    .code-block .comment { color: #6c7086; font-style: italic; }
    .code-block .type { color: #89b4fa; }
    .progress-bar { background: #374151; height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 1rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.3s ease; }
    #search-input { background: #1f2937; border: 1px solid #374151; color: #d1d5db; }
    #search-input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-900 text-gray-100">
  <div class="flex h-full w-full">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 min-w-[256px] bg-gray-800 border-r border-gray-700 overflow-y-auto flex-shrink-0 hidden md:block">
      <div class="p-5 border-b border-gray-700">
        <div class="flex items-center gap-3 mb-3">
          <button onclick="goHome()" class="hover:bg-gray-700 p-1.5 rounded transition" title="Go Home">
            <i data-lucide="home" class="w-5 h-5"></i>
          </button>
          <h1 id="site-title" class="text-lg font-bold text-emerald-400 mono flex-1">Scratch Course</h1>
        </div>

        
      </div>
      <nav class="py-2" id="nav-list"></nav>
    </aside>

    <!-- Mobile menu button -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-3 left-3 z-50 bg-gray-800 p-2 rounded-lg border border-gray-700 hover:bg-gray-700 transition">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>

    <!-- Mobile overlay -->
    <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/60 z-40 md:hidden" onclick="toggleMobile()"></div>

    <aside id="mobile-sidebar" class="hidden fixed left-0 top-0 h-full w-64 bg-gray-800 z-50 overflow-y-auto md:hidden shadow-2xl">
      <div class="p-5 border-b border-gray-700 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <button onclick="goHome()" class="hover:bg-gray-700 p-1.5 rounded transition" title="Go Home">
            <i data-lucide="home" class="w-5 h-5"></i>
          </button>
          <h1 class="text-lg font-bold text-emerald-400 mono">Scratch</h1>
        </div>
        <button onclick="toggleMobile()" class="hover:bg-gray-700 p-1.5 rounded transition">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <nav class="py-2" id="mobile-nav-list"></nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6 md:p-10" id="main-content">
      <div class="max-w-3xl mx-auto fade-in">
        <div class="text-center mb-8 md:mb-12">
          <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent mb-4">
            Scratch Programming Course
          </h1>
          <p class="text-xl text-gray-400">Learn visual programming through games and interactive projects</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const lessons = [
      {
        title: "🟡 What is Scratch?",
        level: "Beginner",
        content: `
          <h2>What is Scratch?</h2>
          <p>Scratch is a <strong>free visual programming language</strong> created by MIT that makes it easy to learn programming concepts without typing complex code. Instead, you drag and drop colored blocks to create programs.</p>
          <h3>Why Learn Scratch?</h3>
          <ul>
            <li><strong>Visual Learning</strong> — See your code as colorful blocks, not text</li>
            <li><strong>Immediate Feedback</strong> — Run your code instantly to see results</li>
            <li><strong>Creative Projects</strong> — Make games, animations, and interactive stories</li>
            <li><strong>Foundation for Coding</strong> — Learn programming concepts that transfer to Python, JavaScript, and more</li>
          </ul>
          <h3>The Scratch Interface</h3>
          <table>
            <thead><tr><th>Section</th><th>Purpose</th></tr></thead>
            <tbody>
              <tr><td><strong>Stage</strong></td><td>Where your project runs and displays</td></tr>
              <tr><td><strong>Sprites Panel</strong></td><td>Your characters and objects</td></tr>
              <tr><td><strong>Blocks Palette</strong></td><td>Colored blocks organized by category</td></tr>
              <tr><td><strong>Code Editor</strong></td><td>Where you drag blocks to build scripts</td></tr>
            </tbody>
          </table>
          <h3>🚀 Try It Now</h3>
          <p>Visit <strong><a href="https://scratch.mit.edu" target="_blank" class="text-emerald-400 hover:text-emerald-300 underline">scratch.mit.edu</a></strong> and click "Create" to start building your first project!</p>
          <div class="mt-8 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-lg">
            <h4 class="font-semibold text-emerald-300 mb-2 flex items-center gap-2">
              <i data-lucide="check-circle" class="w-5 h-5"></i>Lesson Complete
            </h4>
            <button onclick="markComplete()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-medium transition">
              Mark as Complete
            </button>
          </div>
        `
      },
      {
        title: "🟡 What is a Sprite?",
        level: "Beginner",
        content: `
          <h2>What is a Sprite?</h2>
          <p>A <strong>sprite</strong> is a character or object in your Scratch project. It can be a cat, a ball, a spaceship, or anything else you imagine. Every sprite has its own set of scripts (code blocks).</p>
          <h3>Sprite Properties</h3>
          <ul>
            <li><strong>Costume</strong> — The image or appearance of the sprite</li>
            <li><strong>Position (x, y)</strong> — Where it is on the stage (-240 to 240)</li>
            <li><strong>Direction</strong> — Which way it's facing (0-360°)</li>
            <li><strong>Size</strong> — How large or small the sprite is (0-100%+)</li>
            <li><strong>Visibility</strong> — Whether it's shown or hidden</li>
          </ul>
          <h3>Working with Sprites</h3>
          <table>
            <thead><tr><th>Action</th><th>How to Do It</th></tr></thead>
            <tbody>
              <tr><td>Add sprite</td><td>Click <strong>+</strong> in Sprites panel</td></tr>
              <tr><td>Edit sprite</td><td>Click sprite in Sprites panel</td></tr>
              <tr><td>Delete sprite</td><td>Right-click → Delete</td></tr>
              <tr><td>Change costume</td><td>Costumes tab → Paint/Edit</td></tr>
            </tbody>
          </table>
          <div class="mt-8 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-lg">
            <h4 class="font-semibold text-emerald-300 mb-2 flex items-center gap-2">
              <i data-lucide="check-circle" class="w-5 h-5"></i>Mark Complete
            </h4>
            <button onclick="markComplete()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-medium transition">
              ✓ Complete Lesson
            </button>
          </div>
        `
      },
      // ... (keeping all other lessons the same for brevity - add completion button to each)
      {
        title: "🔴 Multiplayer Logic",
        level: "Advanced",
        content: `
          <h2>Multiplayer Game Logic</h2>
          <p>Build games where multiple players compete or cooperate. This requires careful management of separate sprites and turn-based or simultaneous mechanics.</p>
          <h3>🎮 Final Challenge: Build Pong!</h3>
          <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div>
              <h4 class="font-semibold mb-3">Player 1 (W/S keys)</h4>
              <div class="code-block"><span class="keyword">when green flag clicked</span>
<span class="keyword">forever</span>
    <span class="keyword">if</span> <span class="string">"w"</span> key pressed? <span class="keyword">then</span>
        change y by <span class="type">5</span>
    <span class="keyword">if</span> <span class="string">"s"</span> key pressed? <span class="keyword">then</span>
        change y by <span class="type">-5</span></div>
            </div>
            <div>
              <h4 class="font-semibold mb-3">Ball Logic</h4>
              <div class="code-block"><span class="keyword">when green flag clicked</span>
<span class="keyword">forever</span>
    move <span class="type">6</span> steps
    <span class="keyword">if</span> touching edge <span class="keyword">bounce</span>
    <span class="keyword">if</span> touching <span class="string">"Paddle1"</span>?
        turn cw <span class="type">180</span></div>
            </div>
          </div>
          <div class="mt-8 p-4 bg-emerald-500/10 border border-emerald-500/30 rounded-lg">
            <h4 class="font-semibold text-emerald-300 mb-2 flex items-center gap-2">
              <i data-lucide="award" class="w-5 h-5"></i>Course Complete!
            </h4>
            <button onclick="markComplete()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 px-6 py-3 rounded-lg text-sm font-semibold transition shadow-lg">
              🎉 Finish Course
            </button>
          </div>
        `
      }
    ].map(lesson => ({ ...lesson, completed: false })); // Add completed tracking

    let currentLesson = 0;
    let filteredLessons = [...lessons];

    // Progress persistence
    function loadProgress() {
      try {
        const saved = localStorage.getItem('scratch-progress');
        if (saved) {
          const progress = JSON.parse(saved);
          lessons.forEach((lesson, i) => {
            lesson.completed = progress[i] || false;
          });
        }
      } catch (e) {
        console.warn('Could not load progress:', e);
      }
    }

    function saveProgress() {
      const progress = lessons.map(l => l.completed);
      localStorage.setItem('scratch-progress', JSON.stringify(progress));
    }

    function updateProgressBar() {
      const completed = lessons.filter(l => l.completed).length;
      const percentage = (completed / lessons.length) * 100;
      document.getElementById('progress-fill').style.width = `${percentage}%`;
    }

    window.markComplete = function() {
      lessons[currentLesson].completed = true;
      saveProgress();
      renderAll();
    };

    function buildNav(container, items = lessons) {
      container.innerHTML = '';
      items.forEach((lesson, i) => {
        const item = document.createElement('div');
        const baseClass = `sidebar-item px-5 py-2.5 cursor-pointer text-sm text-gray-300 flex items-center justify-between`;
        let className = baseClass;
        
        if (i === currentLesson) {
          className += ' active';
        } else if (lesson.completed) {
          className += ' completed';
        }
        
        item.className = className;
        item.innerHTML = `
          <span>${lesson.title}</span>
          ${lesson.completed ? '<i data-lucide="check" class="w-4 h-4 ml-2 text-emerald-400"></i>' : ''}
        `;
        item.onclick = () => { 
          currentLesson = i; 
          renderAll(); 
          toggleMobile(false); 
        };
        container.appendChild(item);
      });
    }

    function filterLessons(query) {
      if (!query.trim()) {
        filteredLessons = [...lessons];
      } else {
        filteredLessons = lessons.filter(lesson => 
          lesson.title.toLowerCase().includes(query.toLowerCase()) ||
          lesson.content.toLowerCase().includes(query.toLowerCase()) ||
          lesson.level.toLowerCase().includes(query.toLowerCase())
        );
      }
      currentLesson = 0; // Reset to first filtered result
      renderAll();
    }

    function renderContent() {
      const main = document.getElementById('main-content');
      const lesson = lessons[currentLesson];
      if (!lesson) return;

      main.innerHTML = `
        <article class="max-w-3xl mx-auto lesson-content fade-in">
          <div class="mb-8">
            <div class="flex items-center gap-3 mb-4">
              <span class="px-3 py-1 bg-blue-500/20 text-blue-300 rounded-full text-xs font-medium">${lesson.level}</span>
              <span class="text-2xl">${lesson.title}</span>
            </div>
            ${lesson.completed ? 
              '<div class="flex items-center gap-2 text-emerald-400 mb-6"><i data-lucide="check-circle" class="w-6 h-6"></i><span class="font-medium">✓ Lesson Completed</span></div>' : 
              ''
            }
          </div>
          ${lesson.content}
          <div class="flex flex-col sm:flex-row justify-between gap-4 mt-12 pt-8 border-t border-gray-700">
            ${currentLesson > 0 ? 
              `<button onclick="nav(-1)" class="flex items-center justify-center gap-2 px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm font-medium transition w-full sm:w-auto">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>Previous
              </button>` : 
              ''
            }
            ${currentLesson < lessons.length - 1 ? 
              `<button onclick="nav(1)" class="flex items-center justify-center gap-2 px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-medium transition w-full sm:w-auto">
                Next<i data-lucide="chevron-right" class="w-4 h-4"></i>
              </button>` : 
              ''
            }
          </div>
        </article>
        <style>
          .lesson-content h2 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; color: #6ee7b7; }
          .lesson-content h3 { font-size: 1.375rem; font-weight: 600; margin: 2rem 0 1rem 0; color: #a7f3d0; }
          .lesson-content h4 { font-size: 1.125rem; font-weight: 600; margin: 1.5rem 0 0.75rem 0; color: #d1fae5; }
          .lesson-content p { margin-bottom: 1.25rem; line-height: 1.8; color: #d1d5db; }
          .lesson-content ul { list-style: disc; padding-left: 1.75rem; margin-bottom: 1.25rem; }
          .lesson-content li { margin-bottom: 0.5rem; color: #d1d5db; line-height: 1.7; }
          .lesson-content ol { padding-left: 1.75rem; margin-bottom: 1.25rem; }
          .lesson-content code { background: #374151; padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-size: 0.875rem; color: #a5b4fc; }
          .lesson-content table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background: #1f2937; border-radius: 0.5rem; overflow: hidden; }
          .lesson-content th, .lesson-content td { border: 1px solid #4b5563; padding: 0.75rem 1rem; text-align: left; }
          .lesson-content th { background: #374151; font-weight: 600; color: #f9fafb; }
          .lesson-content td { color: #d1d5db; }
          .lesson-content a { color: #34d399; text-decoration: none; }
          .lesson-content a:hover { text-decoration: underline; }
        </style>
      `;
      
      lucide.createIcons();
    }

    function renderAll() {
      buildNav(document.getElementById('nav-list'), filteredLessons);
      buildNav(document.getElementById('mobile-nav-list'), filteredLessons);
      renderContent();
      updateProgressBar();
    }

    window.nav = function(dir) { 
      currentLesson = Math.max(0, Math.min(lessons.length - 1, currentLesson + dir)); 
      renderAll(); 
      document.getElementById('main-content').scrollTop = 0; 
    };

    window.goHome = function() { window.location.href = 'index.html'; };

    window.toggleMobile = function(force) {
      const sidebar = document.getElementById('mobile-sidebar');
      const overlay = document.getElementById('mobile-overlay');
      const isHidden = sidebar.classList.contains('hidden');
      const show = force !== undefined ? force : !isHidden;
      
      sidebar.classList.toggle('hidden', !show);
      overlay.classList.toggle('hidden', !show);
      
      if (!show) document.activeElement?.blur();
    };

    // Search functionality
    document.getElementById('search-input')?.addEventListener('input', (e) => {
      filterLessons(e.target.value);
    });

    // Initialize
    function init() {
      loadProgress();
      renderAll();
      lucide.createIcons();
      
      // Mobile menu
      document.getElementById('mobile-menu-btn').onclick = () => toggleMobile();
    }

    // SDK Integration
    const defaultConfig = { 
      site_title: 'Scratch Course', 
      primary_color: '#10b981', 
      surface_color: '#1f2937', 
      text_color: '#d1d5db', 
      accent_color: '#6ee7b7', 
      bg_color: '#111827', 
      font_family: 'Source Sans 3', 
      font_size: 16 
    };

    function applyConfig(config) {
      const title = config.site_title || defaultConfig.site_title;
      document.getElementById('site-title').textContent = title;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
            { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } }
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
        }),
        mapToEditPanelValues: (config) => new Map([["site_title", config.site_title || defaultConfig.site_title]])
      });
    }

    // Start app
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
 </body>
</html>
