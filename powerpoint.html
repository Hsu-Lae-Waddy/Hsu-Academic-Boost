    <style>
        body {
            background-color: #f7f9fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Layout for the grid of cards */
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(620px, 1fr));
            gap: 30px;
            padding: 40px;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Individual Card Styling */
        .lesson-card {
            background-color: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .lesson-card:hover {
            transform: translateY(-5px);
        }

        /* Header inside the card */
        .PP {
            padding: 15px 20px;
            background-color: #4f6f9f;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .PP p {
            margin: 0;
            font-weight: normal;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Carousel Container */
        .carousel-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px; /* Space around the frame */
        }

        /* The frame that cuts off images */
        .carousel-wrapper {
            width: 600px;
            height: 400px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            background: #eee;
            
        
        }

        /* The sliding track */
        .carousel-images {
            display: flex;
            width: fit-content; /* Important to fit all images in a row */
            transition: transform 0.4s ease-in-out;
            
        }

        .carousel-images img {
            width: 600px;
            height: 400px;
            object-fit: cover;
            flex-shrink: 0;
           

        }

        /* Navigation Buttons */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            font-size: 24px;
            padding: 12px 16px;
            margin: 10px 20px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
            color: #333;

        }

        .arrow-btn:hover {
            background-color: #ffffff;
            transform: translateY(-50%) scale(1.1);
        }

        .left-btn { left: -10px; }
        .right-btn { right: -10px; }

    </style>
</head>

    <script>
       const slider = document.getElementById('imageSlider');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

const images = slider.querySelectorAll('img');
const totalImages = images.length;

let currentIndex = 0;

function updateCarousel() {
    const imageWidth =
        document.querySelector('.carousel-wrapper').clientWidth;

    slider.style.transform =
        `translateX(${-currentIndex * imageWidth}px)`;
}

nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % totalImages;
    updateCarousel();
});

prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + totalImages) % totalImages;
    updateCarousel();
});

window.addEventListener('resize', updateCarousel);


    </script>
