<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Image Carousel</title>
    <style>
        /* Center the carousel on the screen */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f9fc;
            font-family: sans-serif;
        }

        /* Outer Container holding arrows and images */
        .carousel-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 600px; /* Width of a single image */
        }
  
        /* The frame that cuts off the other 11 images */
        .carousel-wrapper {
            width: 100%;
            height: 400px; /* Height of your images */
            overflow: hidden; /* Hides images that sit outside the frame */
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* The long ribbon holding all 12 images side-by-side */
        .carousel-images {
            display: flex;
            transition: transform 0.4s ease-in-out; /* Smooth sliding effect */
        }

        /* Forces each image to perfectly fit the viewport size */
        .carousel-images img {
            width: 600px;
            height: 400px;
            object-fit: cover; 
    flex-shrink: 0;
        }

        /* Arrow Buttons styling */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            font-size: 24px;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        .arrow-btn:hover {
            background-color: #ffffff;
        }

        /* Push arrows slightly inside the image boundaries so they don't hide off-screen */
        .left-btn { left: 10px; }
        .right-btn { right: 10px; }
    </style>
</head>
<body>

    <div class="carousel-container">
        <button class="arrow-btn left-btn" id="prevBtn">&#10094;</button>

        <div class="carousel-wrapper">
            <div class="carousel-images" id="imageSlider">
                <img src="assests/powerpoint1/1.jpg" alt="Image 1">
                <img src="assests/powerpoint1/2.jpg" alt="Image 2">
                <img src="assests/powerpoint1/3.jpg" alt="Image 3">
                <img src="assests/powerpoint1/4.jpg" alt="Image 4">
                <img src="assests/powerpoint1/5.jpg" alt="Image 5">
                <img src="assests/powerpoint1/6.jpg" alt="Image 6">
                <img src="assests/powerpoint1/7.jpg" alt="Image 7">
                <img src="assests/powerpoint1/8.jpg" alt="Image 8">
                <img src="assests/powerpoint1/9.jpg" alt="Image 9">
                <img src="assests/powerpoint1/10.jpg" alt="Image 10">
                <img src="assests/powerpoint1/11.jpg" alt="Image 11">
                <img src="assests/powerpoint1/12.jpg" alt="Image 12">
            </div>
        </div>

        <button class="arrow-btn right-btn" id="nextBtn">&#10095;</button>
    </div>

    <script>
       const slider = document.getElementById('imageSlider');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

const images = slider.querySelectorAll('img');
const totalImages = images.length;

let currentIndex = 0;

function updateCarousel() {
    const imageWidth =
        document.querySelector('.carousel-wrapper').clientWidth;

    slider.style.transform =
        `translateX(${-currentIndex * imageWidth}px)`;
}

nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % totalImages;
    updateCarousel();
});

prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + totalImages) % totalImages;
    updateCarousel();
});

window.addEventListener('resize', updateCarousel);


    </script>
</body>
</html>
