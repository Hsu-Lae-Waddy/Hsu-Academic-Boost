<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PowerPoint Collection</title>

<link rel="icon" type="image/png" href="LogoHAB-removebg-preview.png">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#f8fafc;
    font-family:'Segoe UI',sans-serif;
}

.lesson-grid{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.lesson-card{
    background:white;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    transition:.3s;
}

.lesson-card:hover{
    transform:translateY(-5px);
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px;

    background:linear-gradient(
        135deg,
        #0f766e,
        #14b8a6
    );

    color:white;
}

.card-header h2{
    font-size:1.5rem;
    font-weight:700;
}

.card-header p{
    opacity:.9;
    margin-top:5px;
}

.badge{
    background:white;
    color:#0f766e;

    padding:8px 14px;
    border-radius:999px;
    font-weight:600;
}

.carousel-section{
    position:relative;
    padding:25px;
}

.carousel-wrapper{
    width:100%;
    aspect-ratio:16/9;
     height:650px; /* adjust */
    overflow:hidden;

    border-radius:16px;
    background:#e2e8f0;
}

.carousel-images{
    display:flex;
    transition:transform .4s ease;
}

.slide{
    min-width:100%;
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:white;
}

.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);

    width:50px;
    height:50px;

    border:none;
    border-radius:50%;

    background:white;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    cursor:pointer;

    font-size:22px;
    z-index:10;

    transition:.2s;
}

.nav-btn:hover{
    transform:translateY(-50%) scale(1.08);
}

.prev-btn{
    left:10px;
}

.next-btn{
    right:10px;
}

.card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 25px;

    border-top:1px solid #e2e8f0;
}

.slide-counter{
    font-weight:600;
    color:#475569;
}

.action-buttons{
    display:flex;
    gap:10px;
}

.download-btn{
    background:#0f172a;
    color:white;

    padding:10px 18px;
    border-radius:10px;

    text-decoration:none;
}

@media(max-width:768px){

    .card-header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    .card-footer{
        flex-direction:column;
        gap:15px;
    }

}

</style>
</head>

<body>

<!-- Navbar -->

<nav class="bg-slate-950 border-b border-slate-800">

    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <div>
            <h1 class="text-2xl font-bold text-emerald-400">
                🎓 Hsu Academic Boost
            </h1>

            <p class="text-slate-400 text-sm">
                PowerPoint Collection Library
            </p>
        </div>

        <a href="index.html"
           class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-lg transition">
            Back Home
        </a>

    </div>

</nav>

<!-- Content -->

<div class="lesson-grid">

    <div class="lesson-card">

        <div class="card-header">

            <div>
                <h2>🌐 Digital Literacy</h2>
                <p>
                    Learn how the Internet works and stay safe online.
                </p>
            </div>

            <div class="badge">
                12 Slides
            </div>

        </div>

        <div class="carousel-section">

            <button class="nav-btn prev-btn" id="prevBtn">
                ❮
            </button>

            <div class="carousel-wrapper">

                <div class="carousel-images" id="imageSlider">

                    <div class="slide">
                        <img src="assests/powerpoint1/1.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/2.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/3.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/4.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/5.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/6.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/7.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/8.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/9.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/10.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/11.jpg">
                    </div>

                    <div class="slide">
                        <img src="assests/powerpoint1/12.jpg">
                    </div>

                </div>

            </div>

            <button class="nav-btn next-btn" id="nextBtn">
                ❯
            </button>

        </div>

        <div class="card-footer">

            <div class="slide-counter">
                Slide
                <span id="currentSlide">1</span>
                /
                <span id="totalSlides">12</span>
            </div>

            <div class="action-buttons">

               <a href="pdf/digital-literacy.pdf"
   download
   class="download-btn">
    ⬇ Download PDF
</a>

            </div>

        </div>

    </div>

</div>

<script>

const slider =
document.getElementById("imageSlider");

const slides =
document.querySelectorAll(".slide");

const prevBtn =
document.getElementById("prevBtn");

const nextBtn =
document.getElementById("nextBtn");

const currentSlide =
document.getElementById("currentSlide");

const totalSlides =
document.getElementById("totalSlides");

let currentIndex = 0;

totalSlides.textContent = slides.length;

function updateCarousel(){

    slider.style.transform =
    `translateX(-${currentIndex * 100}%)`;

    currentSlide.textContent =
    currentIndex + 1;
}

nextBtn.addEventListener("click", () => {

    currentIndex =
    (currentIndex + 1) % slides.length;

    updateCarousel();

});

prevBtn.addEventListener("click", () => {

    currentIndex =
    (currentIndex - 1 + slides.length)
    % slides.length;

    updateCarousel();

});

updateCarousel();

</script>

</body>
</html>
