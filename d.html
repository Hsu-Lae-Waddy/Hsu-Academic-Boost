<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPO Quiz Game</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  .correct{
    background:#16a34a !important;
    color:white;
  }

  .wrong{
    background:#dc2626 !important;
    color:white;
  }
</style>

</head>

<body class="bg-gray-100 min-h-screen p-5">

<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-6">

  <h1 class="text-4xl font-bold text-center mb-2">
    💻 IPO Quiz Game
  </h1>

  <p class="text-center text-gray-600 mb-8">
    Choose Input, Process, or Output
  </p>

  <div id="quizContainer" class="space-y-6"></div>

  <div class="text-center mt-8">
    <button onclick="showScore()" 
      class="bg-blue-600 text-white px-6 py-3 rounded-xl text-lg">
      Show Score
    </button>
  </div>

  <div id="scoreBox" class="text-center text-2xl font-bold mt-6"></div>

</div>

<script>

const questions = [

  {
    image:"https://p16-oec-general-useast5.ttcdn-us.com/tos-useast5-i-omjb5zjo8w-tx/95475db49bd048ecb3a4e8f5e20c2c27~tplv-fhlh96nyum-resize-webp:800:800.webp?dr=12190&t=555f072d&ps=933b5bde&shp=8dbd94bf&shcp=948674b7&idc=useast5&from=2378011839",
    device:"💡 Smart Light",
    text:"System receives instruction",
    answer:"Process",
    text2:"User presses app/button",
    answer2:"Input",
    text3:"Light turns ON/OFF",
    answer3:"Output"
  },

  {
    image:"https://www.digitaltrends.com/tachyon/2018/12/samsung-family-hub-refrigerator-rf28nhedbsg-aa-6323-feat.jpg?resize=1200%2C720",
    device:"🧊 Smart Refrigerator",
    text3:"User changes cooling level",
    answer3:"Input",
    text2:"System checks temperature",
    answer2:"Process",
    text:"Fridge becomes colder",
    answer:"Output"
  },{
    image:"https://m.media-amazon.com/images/S/aplus-media-library-service-media/b90c1b2b-172e-4e9f-a734-58cce921c9e1.__CR0,0,1600,1200_PT0_SX800_V1___.jpg",
    device:" Smart Stove",
    text3:"User changes cooling level",
    answer3:"Input",
    text2:"System checks temperature",
    answer2:"Process",
    text:"Fridge becomes colder",
    answer:"Output"
  },

  {
    image:"https://datenwissen.com/media/images/blog-images/Bengaluru_AI_Traffic_Signal_Timer_Revolutionizing_Urban_Traffic_Management.png",
    answer2:"Input",
    text:"Computer analyzes traffic",
    answer:"Process",
    text3:"Traffic light changes color",
    answer3:"Output"
  },
  {
    image:"https://www.uhhospitals.org/-/media/images/blog/2022/09/smart-watch-1286099942-blog-mainarticleimage.jpg?h=450&w=720&la=en&hash=D225EB49F07B821291436DDF7645CA3E",
    device:"⌚ Smart Watch",
    text:"User touches screen",
    answer:"Input",
    text2:"Watch processes health data",
    answer2:"Process",
     text3:"Heart rate shown on screen",
    answer:"Output"

  },

];

let score = 0;

const container = document.getElementById("quizContainer");

questions.forEach((q,index)=>{

  container.innerHTML += `

     <div class="bg-gray-100 p-5 rounded-2xl">

      <!-- IMAGE -->
      <img src="${q.image}"
        class="w-full h-100 object-cover rounded-xl mb-4">

      <!-- DEVICE NAME -->
      <h2 class="text-2xl font-bold mb-6">
        ${q.device}
      </h2>

      <!-- QUESTION 1 -->
      <div class="mb-6 bg-white p-4 rounded-xl">

        <p class="text-lg font-semibold mb-3">
          ${q.text}
        </p>

        <div class="flex gap-3 flex-wrap">

          <button onclick="checkAnswer(this,'Input','${q.answer}')"
            class="bg-blue-500 text-white px-4 py-2 rounded-lg">
            Input
          </button>

          <button onclick="checkAnswer(this,'Process','${q.answer}')"
            class="bg-yellow-500 text-white px-4 py-2 rounded-lg">
            Process
          </button>

          <button onclick="checkAnswer(this,'Output','${q.answer}')"
            class="bg-pink-500 text-white px-4 py-2 rounded-lg">
            Output
          </button>

        </div>

      </div>

      <!-- QUESTION 2 -->
      <div class="mb-6 bg-white p-4 rounded-xl">

        <p class="text-lg font-semibold mb-3">
          ${q.text2}
        </p>

        <div class="flex gap-3 flex-wrap">

          <button onclick="checkAnswer(this,'Input','${q.answer2}')"
            class="bg-blue-500 text-white px-4 py-2 rounded-lg">
            Input
          </button>

          <button onclick="checkAnswer(this,'Process','${q.answer2}')"
            class="bg-yellow-500 text-white px-4 py-2 rounded-lg">
            Process
          </button>

          <button onclick="checkAnswer(this,'Output','${q.answer2}')"
            class="bg-pink-500 text-white px-4 py-2 rounded-lg">
            Output
          </button>

        </div>

      </div>

      <!-- QUESTION 3 -->
      <div class="bg-white p-4 rounded-xl">

        <p class="text-lg font-semibold mb-3">
          ${q.text3}
        </p>

        <div class="flex gap-3 flex-wrap">

          <button onclick="checkAnswer(this,'Input','${q.answer3}')"
            class="bg-blue-500 text-white px-4 py-2 rounded-lg">
            Input
          </button>

          <button onclick="checkAnswer(this,'Process','${q.answer3}')"
            class="bg-yellow-500 text-white px-4 py-2 rounded-lg">
            Process
          </button>

          <button onclick="checkAnswer(this,'Output','${q.answer3}')"
            class="bg-pink-500 text-white px-4 py-2 rounded-lg">
            Output
          </button>

        </div>

      </div>

    </div>
  `;

});

function checkAnswer(button,selected,correct){

  const parent = button.parentElement;

  if(parent.classList.contains("done")){
    return;
  }

  parent.classList.add("done");

  if(selected === correct){

    button.classList.add("correct");

    score++;

  }else{

    button.classList.add("wrong");

  }

}

function showScore(){

  document.getElementById("scoreBox").innerHTML =
  "🎉 Your Score: " + score + " / " + (questions.length * 3);

}

</script>

</body>
</html>
