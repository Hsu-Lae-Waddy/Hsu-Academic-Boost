<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowchart Building Quiz</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.flow-box{
  min-height:70px;
}

.correct{
  background:#16a34a !important;
  color:white;
}

.wrong{
  background:#dc2626 !important;
  color:white;
}

</style>

</head>

<body class="bg-gradient-to-r from-teal-200 to-teal-500 min-h-screen p-5">

<div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-xl">

  <h1 class="text-3xl font-bold text-center mb-6">
    💾 Storage Units Quiz
  </h1>

  <!-- Question 1 -->
  <div class="mb-6 p-4 bg-gray-100 rounded-xl">

    <h2 class="font-bold mb-3">
      1️⃣ What is a Bit?
    </h2>

    <button onclick="check(this,true)"
      class="bg-blue-500 text-white px-4 py-2 rounded-lg m-1">
      0 or 1
    </button>

    <button onclick="check(this,false)"
      class="bg-blue-500 text-white px-4 py-2 rounded-lg m-1">
      8 bits
    </button>

  </div>

  <!-- Question 2 -->
  <div class="mb-6 p-4 bg-gray-100 rounded-xl">

    <h2 class="font-bold mb-3">
      2️⃣ How many bits are in 1 Byte?
    </h2>

    <button onclick="check(this,false)"
      class="bg-green-500 text-white px-4 py-2 rounded-lg m-1">
      2
    </button>

    <button onclick="check(this,true)"
      class="bg-green-500 text-white px-4 py-2 rounded-lg m-1">
      8
    </button>

    <button onclick="check(this,false)"
      class="bg-green-500 text-white px-4 py-2 rounded-lg m-1">
      1024
    </button>

  </div>

  <!-- Question 3 -->
  <div class="mb-6 p-4 bg-gray-100 rounded-xl">

    <h2 class="font-bold mb-3">
      3️⃣ 1 KB equals?
    </h2>

    <button onclick="check(this,true)"
      class="bg-yellow-500 text-white px-4 py-2 rounded-lg m-1">
      1024 bytes
    </button>

    <button onclick="check(this,false)"
      class="bg-yellow-500 text-white px-4 py-2 rounded-lg m-1">
      8 bytes
    </button>

  </div>

  <!-- Question 4 -->
  <div class="mb-6 p-4 bg-gray-100 rounded-xl">

    <h2 class="font-bold mb-3">
      4️⃣ Which is bigger?
    </h2>

    <button onclick="check(this,false)"
      class="bg-purple-500 text-white px-4 py-2 rounded-lg m-1">
      KB
    </button>

    <button onclick="check(this,true)"
      class="bg-purple-500 text-white px-4 py-2 rounded-lg m-1">
      GB
    </button>

  </div>

  <div id="result" class="text-2xl text-center font-bold mt-6"></div>

</div>

<script>

let score = 0;
let total = 4;
let answered = 0;

function check(button,correct){

  if(button.parentElement.classList.contains("done")){
    return;
  }

  button.parentElement.classList.add("done");

  answered++;

  if(correct){

    button.style.background = "#16a34a";

    score++;

  }else{

    button.style.background = "#dc2626";

  }

  if(answered === total){

    document.getElementById("result").innerHTML =
      "🎉 Score: " + score + " / " + total;

  }

}

</script>

</body>
</html>
