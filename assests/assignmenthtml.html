<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Learning System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  position: fixed;
  background: #f1f1f1;
  overflow-y: auto;
  padding-top: 10px;
}

.sidebar h2 {
  text-align: center;
  font-size: 18px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
}

.sidebar button:hover {
  background: #ddd;
}

/* Main content */
.main {
  margin-left: 220px;
  padding: 20px;
}

/* Code box */
.code {
  background: #272822;
  color: #fff;
  padding: 10px;
  font-family: monospace;
  overflow-x: auto;
}

/* Try it editor */
textarea {
  width: 100%;
  height: 150px;
  margin-top: 10px;
}

iframe {
  width: 100%;
  height: 200px;
  border: 1px solid #ccc;
}

.run-btn {
  margin-top: 10px;
  padding: 8px 12px;
  background: #04aa6d;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📘 Learn Web</h2>
  <button onclick="showPage('html')">HTML Intro</button>
  <button onclick="showPage('elements')">HTML Elements</button>
  <button onclick="showPage('attributes')">HTML Attributes</button>
  <button onclick="showPage('css')">CSS Intro</button>
  <button onclick="showPage('assignment')">Assignments</button>
  <button onclick="showPage('tryit')">Try It Editor</button>
</div>

<!-- MAIN -->
<div class="main">

  <div id="content"></div>

</div>

<script>

function showPage(page){

  let content = document.getElementById("content");

  if(page === "html"){
    content.innerHTML = `
      <h1>HTML Introduction</h1>
      <p>HTML is used to create the structure of web pages.</p>

      <div class="code">
&lt;h1&gt;Hello World&lt;/h1&gt;
&lt;p&gt;This is a paragraph&lt;/p&gt;
      </div>
    `;
  }

  else if(page === "elements"){
    content.innerHTML = `
      <h1>HTML Elements</h1>
      <p>An HTML element has start tag, content, end tag.</p>

      <div class="code">
&lt;p&gt;This is a paragraph&lt;/p&gt;
      </div>
    `;
  }

  else if(page === "attributes"){
    content.innerHTML = `
      <h1>HTML Attributes</h1>
      <p>Attributes give extra information.</p>

      <div class="code">
&lt;a href="https://google.com"&gt;Google&lt;/a&gt;
      </div>
    `;
  }

  else if(page === "css"){
    content.innerHTML = `
      <h1>CSS Introduction</h1>
      <p>CSS is used to style HTML.</p>

      <div class="code">
h1 {
  color: blue;
}
      </div>
    `;
  }

  else if(page === "assignment"){
    content.innerHTML = `
      <h1>Assignments</h1>

      <h3>1. My Portfolio</h3>
      <ul>
        <li>Create homepage</li>
        <li>About section</li>
        <li>Image</li>
        <li>Skills</li>
      </ul>

      <h3>2. Online Shop</h3>
      <ul>
        <li>Products list</li>
        <li>Images</li>
        <li>Price</li>
      </ul>

      <h3>3. Idol Page</h3>
      <ul>
        <li>Biography</li>
        <li>Image</li>
        <li>Achievements</li>
      </ul>
    `;
  }

  else if(page === "tryit"){
    content.innerHTML = `
      <h1>Try It Yourself</h1>

      <p>Write HTML code below:</p>

      <textarea id="code">
<h1>Hello World</h1>
<p>This is my page</p>
      </textarea>

      <button class="run-btn" onclick="runCode()">Run</button>

      <h3>Output:</h3>
      <iframe id="output"></iframe>
    `;
  }

}

function runCode(){
  let code = document.getElementById("code").value;
  let output = document.getElementById("output").contentWindow.document;
  output.open();
  output.write(code);
  output.close();
}

// default page
showPage("html");

</script>

</body>
</html>
