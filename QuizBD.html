<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Binary Quiz</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.correct{
  border:3px solid #16a34a;
  background:#dcfce7;
}

.wrong{
  border:3px solid #dc2626;
  background:#fee2e2;
}

</style>

</head>

<body class="bg-gradient-to-r from-teal-200 to-teal-500 min-h-screen p-5">

<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-6">

  <h1 class="text-4xl font-bold text-center mb-2">
    💻 Decimal ↔ Binary Exercise
  </h1>

  <p class="text-center text-gray-600 mb-8">
    Type the correct answer in the text boxes.
  </p>

  <!-- QUESTION 1 -->
  <div class="bg-gray-100 p-5 rounded-xl mb-5">

    <h2 class="text-xl font-bold mb-3">
      1️⃣ Convert Decimal → Binary
    </h2>

    <p class="mb-3 text-lg">
      5 = ?
    </p>

    <input
      id="q1"
      type="text"
      placeholder="Enter binary number"
      class="w-full p-3 rounded-lg border"
    >

  </div>

  <!-- QUESTION 2 -->
  <div class="bg-gray-100 p-5 rounded-xl mb-5">

    <h2 class="text-xl font-bold mb-3">
      2️⃣ Convert Decimal → Binary
    </h2>

    <p class="mb-3 text-lg">
      10 = ?
    </p>

    <input
      id="q2"
      type="text"
      placeholder="Enter binary number"
      class="w-full p-3 rounded-lg border"
    >

  </div>

  <!-- QUESTION 3 -->
  <div class="bg-gray-100 p-5 rounded-xl mb-5">

    <h2 class="text-xl font-bold mb-3">
      3️⃣ Convert Binary → Decimal
    </h2>

    <p class="mb-3 text-lg">
      101 = ?
    </p>

    <input
      id="q3"
      type="text"
      placeholder="Enter decimal number"
      class="w-full p-3 rounded-lg border"
    >

  </div>

  <!-- QUESTION 4 -->
  <div class="bg-gray-100 p-5 rounded-xl mb-5">

    <h2 class="text-xl font-bold mb-3">
      4️⃣ Convert Binary → Decimal
    </h2>

    <p class="mb-3 text-lg">
      1111 = ?
    </p>

    <input
      id="q4"
      type="text"
      placeholder="Enter decimal number"
      class="w-full p-3 rounded-lg border"
    >

  </div>

  <!-- BUTTON -->
  <div class="text-center">

    <button
      onclick="checkAnswers()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold text-lg"
    >
      ✅ Check Answers
    </button>

  </div>

  <!-- RESULT -->
  <div id="result" class="text-center text-3xl font-bold mt-8"></div>

</div>

<script>

function checkAnswers(){

  let score = 0;

  const answers = {
    q1:"101",
    q2:"1010",
    q3:"5",
    q4:"15"
  };

  for(let id in answers){

    const input = document.getElementById(id);

    const userAnswer = input.value.trim();

    input.classList.remove("correct","wrong");

    if(userAnswer === answers[id]){

      input.classList.add("correct");

      score++;

    }else{

      input.classList.add("wrong");

    }

  }

  document.getElementById("result").innerHTML =
    "🎉 Score: " + score + " / 4";

}

</script>

</body>
</html>
