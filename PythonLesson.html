    <h2>Python Scope</h2>

    <p>
      <strong>Scope</strong> determines where a variable can be accessed in a program.
    </p>

    <p>
      Python has two main types of scope:
    </p>

    <ul>
      <li><strong>Local Scope</strong></li>
      <li><strong>Global Scope</strong></li>
    </ul>

    <hr>

    <h2>Local Scope</h2>

    <p>
      A variable created inside a function belongs to that function only.
      It is called a <strong>local variable</strong>.
    </p>

    <h4>Example</h4>

    <div class="code-block"><span class="keyword">def</span> greet():
    message = <span class="string">"Hello Python"</span>
<span class="keyword">print</span>(message)

greet()</div>

    <strong>Output:</strong>

    <div class="code-block">Hello Python</div>

    <p>
      The variable <code>message</code> exists only inside the
      <code>greet()</code> function.
    </p>

    <div class="code-block"><span class="keyword">def</span> greet():
    message = <span class="string">"Hello Python"</span>

<span class="keyword">print</span>(message)</div>

    <strong>Output:</strong>

    <div class="code-block"><span class="error">NameError</span>: name 'message' is not defined </div>

    <p>
      This happens because <code>message</code> is local to the function.
    </p>



    <h2>Global Scope</h2>

    <p>
      A variable created outside all functions is called a
      <strong>global variable</strong>.
    </p>

    <h4>Example</h4>

    <div class="code-block">name = <span class="string">"Alice"</span>

<span class="keyword">def</span> greet():
  <span class="keyword">print</span>(name)

greet()
<span class="keyword">print</span>(name)</div>

    <strong>Output:</strong>

    <div class="code-block">Alice
Alice</div>

    <p>
      Since <code>name</code> is global, it can be accessed both inside and outside the function.
    </p>

    

    <h2>Local vs Global</h2>

    <div class="code-block">name = <span class="string">"Global"</span>

<span class="keyword">def</span> my_function():
    name = <span class="string">"Local"</span>
  <span class="keyword">print</span>(name)

my_function()
<span class="keyword">print</span>(name)</div>

    <strong>Output:</strong>

    <div class="code-block">Local
Global </div>

    <p>
      Python uses the local variable first inside the function.
      Outside the function, the global variable remains unchanged.
    </p>

  

    <h2>The global Keyword</h2>

    <p>
      Use the <code>global</code> keyword if you want to modify a global variable inside a function.
    </p>

    <h4>Example</h4>

    <div class="code-block">count = <span class="type">0</span>

<span class="keyword">def</span> increase():
   <span class="keyword">global</span>count
    count += <span class="type">1</span>

increase()

<span class="keyword">print</span>(count) </div>

    <strong>Output:</strong>

    <div class="code-block">1</div>

  

    <h2>Real-Life Example</h2>

    <table>
      <tr>
        <th>Scope</th>
        <th>Real-Life Example</th>
      </tr>
      <tr>
        <td>Local Scope</td>
        <td>Your classroom notebook (only you use it)</td>
      </tr>
      <tr>
        <td>Global Scope</td>
        <td>The school notice board (everyone can see it)</td>
      </tr>
    </table>

  

    <h2>Summary</h2>

    <ul>
      <li><strong>Local Scope</strong> → Variable created inside a function.</li>
      <li><strong>Global Scope</strong> → Variable created outside a function.</li>
      <li>Local variables can only be used inside their function.</li>
      <li>Global variables can be used throughout the program.</li>
      <li>Use <code>global</code> to modify a global variable inside a function.</li>
    </ul>
  `
