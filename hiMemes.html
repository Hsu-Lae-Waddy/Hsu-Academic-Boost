<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Collection</title>
  <link rel="icon" type="image/png" href="LogoHAB-removebg-preview.png">


<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}

.carousel-wrapper{
    width:100%;
    max-width:900px;
    height:650px;
    overflow:hidden;
    margin:auto;
    border-radius:16px;
}

.carousel-images{
    display:flex;
    transition:transform .4s ease;
}

.slide{
    flex:0 0 100%;
    min-width:100%;
    height:650px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#1e293b;
}

.slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#64748b;
    cursor:pointer;
    transition:.3s;
}

.dot.active{
    background:#10b981;
    transform:scale(1.2);
}
</style>
</head>

<body>
<nav class="bg-slate-950 border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-emerald-400">
            😂 Meme Collection
        </h1>

        <a href="index.html"
           class="bg-emerald-500 hover:bg-emerald-600 px-5 py-2 rounded-lg text-white">
            Home
        </a>
    </div>
</nav>
<div id="gallery" class="max-w-5xl mx-auto p-6"></div>

<script>

// ====================================
// IMAGE LIST
// ====================================

const memeCollections = {
    counting: [
        "memes/counting0.jpg",
        "memes/counting1.jpg",
        "memes/counting2.jpg",
        "memes/counting3.jpg",
        "memes/counting4.jpg",
        "memes/counting5.jpg"
    ],

    bugs: [
        "memes/bug0.jpg",
        "memes/bug1.jpg",
        "memes/bug2.jpg",
        "memes/bug3.jpg",
        "memes/bug4.jpg",
        "memes/bug5.jpg",
        "memes/bug6.jpg"
    ],
     bugsfeature: [
        "memes/B0.jpg",
        "memes/B1.jpg",
        "memes/B2.jpg",
        "memes/B3.jpg",
        "memes/B4.jpg",
        "memes/B7.jpg",
        "memes/B5.jpg",
        "memes/B6.jpg"
    ],
    FB:[
        "memes/fb0.jpg",
        "memes/fb1.jpg",
        "memes/fb2.jpg",
        "memes/fb3.jpg",
        "memes/fb4.jpg",
        "memes/fb5.jpg",
        "memes/fb6.jpg",
        "memes/fbe.jpg",
    ],
    Full:[
        "memes/full0.jpg",
        "memes/full1.jpg",
        "memes/full2.jpg",
        "memes/full3.jpg",
        "memes/full4.jpg",
        "memes/full5.jpg"

    ]
};
const gallery = document.getElementById("gallery");

function createCarousel(title, images){

    const card = document.createElement("div");

    card.className =
        "bg-slate-900 rounded-2xl shadow-xl overflow-hidden mb-8";

    card.innerHTML = `
        <div class="bg-emerald-600 p-5">
            <h2 class="text-2xl font-bold text-white">${title}</h2>
        </div>

        <div class="relative p-6">

            <button class="prevBtn absolute left-3 top-1/2 -translate-y-1/2 bg-white w-12 h-12 rounded-full z-10">
                ❮
            </button>

            <div class="carousel-wrapper">
                <div class="carousel-images"></div>
            </div>

            <button class="nextBtn absolute right-3 top-1/2 -translate-y-1/2 bg-white w-12 h-12 rounded-full z-10">
                ❯
            </button>

        </div>

        <div class="dots flex justify-center gap-2 pb-6"></div>
    `;

    gallery.appendChild(card);

    const slider = card.querySelector(".carousel-images");
    const dotsContainer = card.querySelector(".dots");

    let currentIndex = 0;

    images.forEach(path => {

        const slide = document.createElement("div");

        slide.className = "slide";

        slide.innerHTML = `<img src="${path}">`;

        slider.appendChild(slide);
    });

    images.forEach((_, index) => {

        const dot = document.createElement("div");

        dot.className = "dot";

        dot.addEventListener("click", () => {
            currentIndex = index;
            updateSlider();
        });

        dotsContainer.appendChild(dot);
    });

    const dots = dotsContainer.querySelectorAll(".dot");

    function updateSlider(){

        slider.style.transform =
            `translateX(-${currentIndex * 100}%)`;

        dots.forEach(dot =>
            dot.classList.remove("active")
        );

        dots[currentIndex].classList.add("active");
    }

    card.querySelector(".nextBtn").onclick = () => {

        currentIndex =
            (currentIndex + 1) % images.length;

        updateSlider();
    };

    card.querySelector(".prevBtn").onclick = () => {

        currentIndex =
            (currentIndex - 1 + images.length) %
            images.length;

        updateSlider();
    };

    updateSlider();
}

createCarousel(
    "😂 Programmers Are Built Different",
    memeCollections.counting
);

createCarousel(
    "🐞 Bug and Programmer Are Always Together",
    memeCollections.bugs
);
createCarousel(
    "🐞 Bug to Feature",
    memeCollections.bugsfeature
);
createCarousel(
    "🤝 Frontend Developer vs Backend Developer",
    memeCollections.FB
);
createCarousel(
    "🦆 Full-Stack Developer",
    memeCollections.Full
);

</script>

</body>
</html>
