
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Collection</title>
  <link rel="icon" type="image/png" href="LogoHAB-removebg-preview.png">


<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}

.carousel-wrapper{
    width:100%;
    max-width:700px;
    height:450px;
    overflow:hidden;
    margin:auto;
    border-radius:16px;
}

.carousel-images{
    display:flex;
    transition:transform .4s ease;
}

.slide{
    width:100%;
    min-width:100%;
    height:450px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#1e293b;
}

.slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}
</style>
</head>

<body>

<nav class="bg-slate-950 border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-emerald-400">
            😂 Meme Collection
        </h1>

        <a href="index.html"
           class="bg-emerald-500 hover:bg-emerald-600 px-5 py-2 rounded-lg text-white">
            Home
        </a>
    </div>
</nav>

<div class="max-w-5xl mx-auto p-6">

    <!-- Meme Card -->
    <div class="bg-slate-900 rounded-2xl shadow-xl overflow-hidden">

        <!-- Header -->
        <div class="bg-emerald-600 p-5">
            <h2 class="text-2xl font-bold text-white">
                Programmers Are Built Different
            </h2>
        </div>

        <!-- Carousel -->
        <div class="relative p-6">

            <button id="prevBtn"
                class="absolute left-3 top-1/2 -translate-y-1/2 bg-white w-12 h-12 rounded-full shadow-lg text-xl hover:scale-110 transition z-10">
                ❮
            </button>

            <div class="carousel-wrapper">

                <div class="carousel-images" id="imageSlider">

                    <div class="slide">
                        <img src="memes/counting0.jpg">
                    </div>

                    <div class="slide">
                        <img src="memes/counting1.jpg">
                    </div>

                    <div class="slide">
                        <img src="memes/counting2.jpg">
                    </div>

                    <div class="slide">
                        <img src="memes/counting3.jpg">
                    </div>

                    <div class="slide">
                        <img src="memes/counting4.jpg">
                    </div>

                    <div class="slide">
                        <img src="memes/counting5.jpg">
                    </div>

                </div>

            </div>

            <button id="nextBtn"
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-white w-12 h-12 rounded-full shadow-lg text-xl hover:scale-110 transition z-10">
                ❯
            </button>

        </div>


    </div>

</div>

<script>

const slider = document.getElementById("imageSlider");
const slides = document.querySelectorAll(".slide");

const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");

let currentIndex = 0;

function updateSlider() {
    slider.style.transform =
        `translateX(-${currentIndex * 100}%)`;
}

nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % slides.length;
    updateSlider();
});

prevBtn.addEventListener("click", () => {
    currentIndex =
        (currentIndex - 1 + slides.length) % slides.length;
    updateSlider();
});

</script>

</body>
</html>
